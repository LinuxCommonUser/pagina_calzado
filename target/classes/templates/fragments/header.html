<div th:fragment="header"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     class="container-fluid m-0 p-0">

    <div class="text-center py-2" style="background-color:#6b3e26; color:white;">
        Calzados Bellasen · Calidad y comodidad desde Trujillo 🇵🇪
    </div>

    <nav class="navbar navbar-expand-md navbar-light shadow-sm" style="background-color:#f8f4f1; min-height:5rem;">
        <div class="container-fluid px-4">

            <a class="navbar-brand fw-bold" th:href="@{/}" style="color: #6b3e26;">
                Calzados Bellasen
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarBellasen" aria-controls="navbarBellasen"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarBellasen">
                
                <ul class="navbar-nav mx-auto mb-2 mb-md-0">
                    <li class="nav-item">
                        <a class="nav-link px-3" th:href="@{/}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" th:href="@{/catalogo}">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" th:href="@{/ofertas}">Ofertas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" th:href="@{/nosotros}">Nosotros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" th:href="@{/contacto}">Contacto</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">

                    <!-- CARRITO -->
                    <a th:href="@{/carrito}" 
                       class="btn btn-outline-dark d-flex align-items-center gap-2 position-relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                             class="bi bi-cart3" viewBox="0 0 16 16">
                            <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 
                                     .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 
                                     0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 
                                     0 0 1-.5-.5z"/>
                        </svg>
                        <span class="fw-bold">Carrito</span>

                        <span th:if="${session.carritoCantidad != null and session.carritoCantidad > 0}"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              th:text="${session.carritoCantidad}">
                        </span>
                    </a>

                    <!-- NO LOGUEADO -->
                    <a sec:authorize="isAnonymous()"
                       th:href="@{/login}"
                       class="btn btn-outline-primary">
                        Iniciar sesión
                    </a>

                    <!-- LOGUEADO -->
                    <div sec:authorize="isAuthenticated()" class="dropdown">
                        <button class="btn btn-outline-success dropdown-toggle"
                                data-bs-toggle="dropdown">
                            <span sec:authentication="name">Usuario</span>
                        </button>

                        <ul class="dropdown-menu dropdown-menu-end">

                            <!-- SOLO ADMIN -->
                            <li sec:authorize="hasRole('ADMIN')">
                                <a class="dropdown-item" th:href="@{/admin/dashboard}">
                                    Panel Administrativo
                                </a>
                            </li>

                            <!-- PUEDES AGREGAR MÁS ROLES -->
                            <li sec:authorize="hasRole('VENDEDOR')">
                                <a class="dropdown-item" th:href="@{/vendedor/dashboard}">
                                    Panel Vendedor
                                </a>
                            </li>

                            <li sec:authorize="hasRole('CLIENTE')">
                                <a class="dropdown-item" th:href="@{/cliente/dashboard}">
                                    Mi Cuenta
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item" th:href="@{/logout}">
                                    Cerrar sesión
                                </a>
                            </li>

                        </ul>
                    </div>

                </div>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
    function agregar(codigoProducto) {
        fetch('/carrito/agregar/' + codigoProducto)
        .then(response => response.text())
        .then(data => {

            if (data === 'NO_LOGIN') {
                window.location.href = '/login';
                return;
            }

            if (data === 'Ok') {
                Swal.fire({
                    position: 'bottom-end',
                    icon: 'success',
                    title: '¡Añadido al carrito!',
                    showConfirmButton: false,
                    timer: 1500,
                    toast: true,
                    background: '#fff',
                    iconColor: '#28a745'
                });
                setTimeout(() => { location.reload(); }, 1000); 
            } else {
                console.error('Error al agregar');
            }
        })
        .catch(error => console.error('Error de conexión:', error));
    }
    </script>

</div>
